<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0B0F19;
            color: #E5E7EB;
            margin: 0;
            padding: 16px;
        }
        h3 {
            color: #3B82F6;
            margin-top: 0;
            font-size: 15px;
            border-bottom: 1px solid #1F2937;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        p {
            font-size: 11px;
            color: #9CA3AF;
            line-height: 1.4;
            margin-bottom: 12px;
        }
        .btn {
            background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        
        /* Command & Recall Input Center */
        .search-container {
            margin-top: 16px;
            position: relative;
        }
        .search-input {
            width: 100%;
            background-color: #111827;
            border: 1px solid #1F2937;
            border-radius: 6px;
            padding: 8px 10px;
            color: #F3F4F6;
            font-size: 11px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            border-color: #3B82F6;
        }

        /* Core Fix: Styles for matching the live search infrastructure */
        .results-container {
            margin-top: 12px;
            max-height: 180px;
            overflow-y: auto;
        }
        .result-item {
            background: #111827;
            border: 1px solid #1F2937;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .result-title {
            font-weight: bold;
            color: #60A5FA;
            text-decoration: none;
            font-size: 11px;
            display: block;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-title:hover { text-decoration: underline; }
        .result-summary {
            color: #9CA3AF;
            margin: 0;
            font-size: 10px;
            line-height: 1.3;
        }
        .no-data {
            font-size: 10px;
            color: #4B5563;
            text-align: center;
            padding: 10px 0;
        }
        
        #status {
            margin-top: 10px;
            font-size: 11px;
            padding: 8px;
            border-radius: 6px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <h3>⚡ Psi Ψ Privacy Agent</h3>
    <p>Isolate your active browser context instantly to release system overhead and secure data.</p>
    
    <button id="archiveBtn" class="btn">Optimize & Archive Tab</button>
    
    <div class="search-container">
        <input 
            type="text" 
            id="recallInput" 
            class="search-input" 
            placeholder="Type a keyword to reinstantiate a closed tab..."
        >
    </div>

    <div id="popupResults" class="results-container"></div>

    <div id="status"></div>

    <script src="popup.js"></script>
</body>
</html>
